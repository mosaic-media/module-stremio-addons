name: release

# Publishing a Go module is pushing a tag — there is no artifact to upload, and
# the module proxy pulls from the tag on first request. That makes "published"
# an unusually easy thing to get wrong: `git push origin v0.5.0` looks like it
# worked whether or not anything downstream can ever resolve it.
#
# So this workflow does the two things a bare tag does not:
#
#   1. Runs the full gate *before* the release exists, by reusing verify.yml
#      rather than a second copy that could drift. A tag must never publish
#      something unverified.
#   2. Proves a consumer can actually resolve the version, by resolving it the
#      way a consumer would — a throwaway module doing `go get` through the
#      public proxy and checksum database. This is the step that earns its
#      keep: the proxy can negative-cache a fetch made moments after a repo
#      becomes public, and the checksum database returns 500 on a first lookup,
#      and both surface as a broken build in the *platform* repository hours
#      later with nothing pointing back here.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # The same gates as an ordinary push, run against the tagged commit.
  verify:
    uses: ./.github/workflows/verify.yml

  release:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Pre-1.0 and minor-bumped by hand, so the shape is checked rather than
      # assumed. A tag like `0.5.0` or `v0.5` resolves to nothing for a consumer
      # and is worth catching before a release object exists for it.
      - name: Check the tag is a semver version
        run: |
          version="${GITHUB_REF_NAME}"
          if ! printf '%s' "$version" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "tag $version is not a vMAJOR.MINOR.PATCH version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_ENV"

      # The module path in go.mod is what a consumer imports; a rename that
      # missed it would publish a tag under a path nothing requires.
      - name: Check the module path matches this repository
        run: |
          declared=$(go list -m)
          expected="github.com/${GITHUB_REPOSITORY}"
          if [ "$declared" != "$expected" ]; then
            echo "go.mod declares $declared but this is $expected" >&2
            exit 1
          fi

      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$version" --title "$version" --generate-notes --verify-tag

      # Resolve it exactly as the platform repository will, from a throwaway
      # module so nothing local can satisfy the import. Retried because the
      # proxy and checksum database are eventually consistent with a tag pushed
      # seconds ago — a 404 or a 500 here is normal for the first minute and a
      # hard failure after that.
      - name: Prove a consumer can resolve it
        run: |
          workdir=$(mktemp -d)
          cd "$workdir"
          go mod init proxycheck >/dev/null
          module="github.com/${GITHUB_REPOSITORY}@${version}"

          for attempt in $(seq 1 12); do
            if go get "$module"; then
              echo "resolved $module on attempt $attempt"
              exit 0
            fi
            echo "attempt $attempt: not resolvable yet, waiting"
            sleep 20
          done

          echo "::error::$module never became resolvable through the public proxy." >&2
          echo "The tag exists but no consumer can require it. Check the repository is public" >&2
          echo "and that the tag was pushed, then re-run this job." >&2
          exit 1
        env:
          GOPROXY: https://proxy.golang.org,direct
          GOFLAGS: -mod=mod

  # This module is composed into the Platform binary and required in its go.mod
  # today — whether core by tier (ADR 0062) or an extension module still composed
  # statically pending the move out of process (ADR 0079). Either way, its
  # release reaches the Platform through the go.mod bump ADR 0078 automates, so
  # this dispatch fires that bump. When an extension module does move out of
  # process, its release will instead publish a signed binary to the repository
  # (ADR 0065) and this job changes shape.
  #
  # It fires last and only on success: the release job above has already proved
  # the tag resolvable, so a dispatch arriving before that proof — which would
  # move the proxy race into the other repository — cannot happen. The Platform
  # side opens a pull request rather than committing; its verify.yml decides.
  # Failure here is not fatal to the release: the tag is real and resolvable
  # whatever happens next, and a missed bump is recoverable by re-running or
  # bumping by hand.
  dispatch:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Tell the Platform there is a new version
        env:
          GH_TOKEN: ${{ secrets.PLATFORM_DISPATCH_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::warning::PLATFORM_DISPATCH_TOKEN is not set — the Platform bump must be done by hand."
            exit 0
          fi

          gh api repos/mosaic-media/platform/dispatches \
            --method POST \
            --field event_type=core-module-release \
            --field "client_payload[module]=github.com/${GITHUB_REPOSITORY}" \
            --field "client_payload[version]=${GITHUB_REF_NAME}"

  # The out-of-process release: cross-compiled binaries and a manifest.json, the
  # artefacts the registry catalogues (ADR 0065, ADR 0079). This is what marks
  # this module as one that can run in its own process, and it is additive to the
  # Go-module release above — the module is still composed statically into the
  # Platform today, so it publishes both a Go tag and binaries until the cutover.
  #
  # An extension module runs as a subprocess of the Platform on the same host, so
  # it ships for every platform the Platform runs on.
  binaries:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # modulesign (build-manifest) lives in the platform repo; build it from a
      # checkout. The documented interim until the manifest format is extracted
      # to a public module.
      - name: Check out platform for the signing tool
        uses: actions/checkout@v4
        with:
          repository: mosaic-media/platform
          path: .platform
      - name: Build modulesign
        run: cd .platform && go build -o "$GITHUB_WORKSPACE/modulesign" ./tools/modulesign

      # CGO off, so every target cross-compiles from this one runner. The command
      # binary is cmd/module-stremio-addons, whose whole body is host.Serve.
      - name: Cross-compile
        run: |
          mkdir -p dist
          for t in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            goos=${t%/*}; goarch=${t#*/}
            name="module-stremio-addons-${goos}-${goarch}"
            [ "$goos" = "windows" ] && name="${name}.exe"
            CGO_ENABLED=0 GOOS=$goos GOARCH=$goarch go build \
              -trimpath -ldflags "-s -w" \
              -o "dist/${name}" ./cmd/module-stremio-addons
          done

      # The module tells the release what it is (id, name, roles), so the
      # manifest's identity has one source of truth — the Go code — not a copy
      # here that drifts. The version is the tag, authoritative over the build's
      # (devel).
      - name: Emit the module's identity
        run: ./dist/module-stremio-addons-linux-amd64 --mosaic-manifest > dist/identity.json

      # Join identity + SDK major + the binaries into the signed-ready manifest.
      # SDK major is 0 while the SDK is pre-1.0 (host.SDKMajor). Each binary's URL
      # points at this repository's own release assets — the module hosts its own
      # bytes, which is why the URL is declared here and not by the registry.
      - name: Build the manifest
        run: |
          pairs=()
          for t in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            goos=${t%/*}; goarch=${t#*/}
            pairs+=("${goos}/${goarch}=dist/module-stremio-addons-${goos}-${goarch}")
          done
          pairs+=("windows/amd64=dist/module-stremio-addons-windows-amd64.exe")
          ./modulesign build-manifest \
            -identity dist/identity.json \
            -sdk-major 0 \
            -version "${GITHUB_REF_NAME}" \
            -url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/module-stremio-addons-{os}-{arch}{ext}" \
            -out dist/manifest.json \
            "${pairs[@]}"
          echo "--- manifest ---"; cat dist/manifest.json

      - name: Upload binaries and manifest to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" dist/module-stremio-addons-* dist/manifest.json
